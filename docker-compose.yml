services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hawar
      POSTGRES_PASSWORD: hawar
      POSTGRES_DB: hawarmusic
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hawar"]
      interval: 5s
      timeout: 5s
      retries: 10

  metube:
    image: ghcr.io/alexta69/metube:latest
    restart: unless-stopped
    environment:
      DOWNLOAD_DIR: /downloads
      AUDIO_DOWNLOAD_DIR: /downloads/audio
      DEFAULT_THEME: dark
      DELETE_FILE_ON_TRASHCAN: "false"
      CUSTOM_DIRS: "true"
      CREATE_CUSTOM_DIRS: "true"
    volumes:
      - metube_downloads:/downloads
    expose:
      - "8081"
    networks:
      - hawarmusic_net

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://hawar:hawar@postgres:5432/hawarmusic
      JWT_SECRET: ${JWT_SECRET:-hawarmusic-2026-cok-gizli-bir-key}
      STORAGE_DRIVER: local
      UPLOAD_DIR: /app/uploads
      MAX_FILE_MB: 50
      METUBE_URL: http://metube:8081
      METUBE_AUDIO_DIR: /metube-downloads/audio
      METUBE_DOWNLOAD_DIR: /metube-downloads
    volumes:
      - uploads_data:/app/uploads
      - metube_downloads:/metube-downloads:ro
    depends_on:
      postgres:
        condition: service_healthy
      metube:
        condition: service_started
    expose:
      - "8000"
    networks:
      - hawarmusic_net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - hawarmusic_net

volumes:
  pg_data:
  uploads_data:
  metube_downloads:

networks:
  hawarmusic_net:
    driver: bridge
